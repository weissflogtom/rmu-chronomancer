<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chronomancer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Chronomancer</h1>
    <div class="round-bar">
      <span class="round-label">Round</span>
      <span id="round-number" class="round-number">1</span>
      <button id="advance-round-btn" class="btn btn-primary btn-large">Advance Round</button>
    </div>
  </header>

  <main>
    <div id="characters-grid"></div>
  </main>

  <footer>
    <div class="footer-actions">
    <div class="footer-left">
      <button id="add-npc-btn" class="btn btn-secondary">+ Add NPC</button>
      <button id="add-pc-btn" class="btn btn-secondary">+ Add PC</button>
      <div id="add-npc-form" class="inline-form hidden">
        <input type="text" id="npc-name-input" placeholder="NPC name" autocomplete="off" />
        <button id="npc-confirm-btn" class="btn btn-sm">Add</button>
        <button id="npc-cancel-btn" class="btn btn-sm btn-ghost">Cancel</button>
      </div>
      <div id="add-pc-form" class="inline-form hidden">
        <select id="pc-template-select"></select>
        <button id="pc-confirm-btn" class="btn btn-sm">Add</button>
        <button id="pc-cancel-btn" class="btn btn-sm btn-ghost">Cancel</button>
      </div>
    </div>
    <div class="footer-right">
      <button id="reset-btn" class="btn btn-ghost btn-ghost-danger">Reset Session</button>
      <button id="manage-pcs-btn" class="btn btn-ghost">Manage PCs</button>
      <button id="export-btn" class="btn btn-ghost">Export</button>
      <label for="import-file" class="btn btn-ghost" role="button">Import</label>
      <input type="file" id="import-file" accept=".json" class="hidden" />
    </div>
    </div>
    <p class="dedication">~ For Don, Keeper of the Fellowship ~</p>
  </footer>

  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Manage PC Templates">
    <div class="modal">
      <div class="modal-header">
        <h2>PC Templates</h2>
        <button id="modal-close-btn" class="btn btn-icon" aria-label="Close">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div class="modal-footer">
        <button id="add-template-btn" class="btn btn-secondary">+ New PC Template</button>
        <div class="modal-footer-right">
          <button id="export-pcs-btn" class="btn btn-ghost btn-sm">Export PCs</button>
          <label for="import-pcs-file" class="btn btn-ghost btn-sm" role="button">Import PCs</label>
          <input type="file" id="import-pcs-file" accept=".json" class="hidden" />
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
